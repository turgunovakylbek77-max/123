        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brend" href="index.html">EduBot Learning</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About-Жөнүндө</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="courses.html">Courses-Курстар</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Register-Каттоо</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact-Байланыш</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <div class="container my-5">
            <h2>Student Registration</h2>
            <form>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name-Аты</label>
                        <input type="text" class="form-control" id="firstName" required />
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last Name-Аты-Жону</label>
                        <input type="text" class="form-control" id="lastName" required />
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required />
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number-Телефон номери</label>
                    <input type="tel" class="form-control" id="phone" />
                </div>

                <div class="mb-3">
                    <label for="course" class="form-label">Select Course-Курсту тандаңыз</label>
                    <select class="form-select" id="course">
                        <option selected disabled>Choose a course...-Курс тандаңыз...</option>
                        <option>Frontend Developnent</option>
                        <option>Backend with Pithon & Django</option>
                        <option>Intro to AI & ML</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password-Купуя сөз</label>
                    <input type="password" class="form-control" id="password" required />
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="terms" />
                    <label class="form-check-label" for="terms">
                        I agree to the terms and conditions.-Мен шарттарга макулмун.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">Submit-Тапшыруу</button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-auto">

    </footer>
